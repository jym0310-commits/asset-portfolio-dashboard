<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>비밀번호 재설정 - 포트폴리오노트</title>
  <link rel="icon" type="image/svg+xml" href="assets/logo.svg" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="auth-body">
  <div class="auth-page">
    <div class="auth-card">
      <div class="brand-row brand-row-center">
        <img src="assets/logo.svg" alt="포트폴리오노트 로고" class="brand-logo" />
        <h1 class="auth-title">비밀번호 재설정</h1>
      </div>

      <form id="resetForm" class="auth-form">
        <div class="form-field">
          <label>새 비밀번호 (8자 이상)</label>
          <input type="password" name="new_password" required minlength="8" autocomplete="new-password">
        </div>
        <div class="form-field">
          <label>새 비밀번호 확인</label>
          <input type="password" name="new_password_confirm" required minlength="8" autocomplete="new-password">
        </div>
        <p class="auth-error hidden" id="resetError"></p>
        <p class="auth-success hidden" id="resetSuccess"></p>
        <button type="submit" class="btn btn-primary auth-submit">비밀번호 변경</button>
      </form>

      <p class="auth-link-row">
        <a href="login.html">로그인 화면으로</a>
      </p>
    </div>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
