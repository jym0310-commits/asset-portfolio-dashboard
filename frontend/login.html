<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로그인 - 포트폴리오노트</title>
  <link rel="icon" type="image/svg+xml" href="assets/logo.svg" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0a0a0f" />
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="포트폴리오노트" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="auth-body">
  <div class="auth-page">
    <div class="auth-card">
      <div class="brand-row brand-row-center">
        <img src="assets/logo.svg" alt="포트폴리오노트 로고" class="brand-logo" />
        <h1 class="auth-title">포트폴리오노트</h1>
      </div>

      <div class="auth-tabs">
        <button class="auth-tab active" id="loginTabBtn">로그인</button>
        <button class="auth-tab" id="signupTabBtn">회원가입</button>
      </div>

      <!-- 로그인 폼 -->
      <form id="loginForm" class="auth-form">
        <div class="form-field">
          <label>이메일</label>
          <input type="email" name="email" required autocomplete="email">
        </div>
        <div class="form-field">
          <label>비밀번호</label>
          <input type="password" name="password" required autocomplete="current-password">
        </div>
        <p class="auth-error hidden" id="loginError"></p>
        <button type="submit" class="btn btn-primary auth-submit">로그인</button>
      </form>

      <p class="auth-link-row" id="forgotPasswordRow">
        <a href="#" id="forgotPasswordLink">비밀번호를 잊으셨나요?</a>
      </p>

      <!-- 비밀번호 찾기(재설정 링크 요청) 폼 -->
      <form id="forgotForm" class="auth-form hidden">
        <div class="form-field">
          <label>가입하신 이메일</label>
          <input type="email" name="email" required autocomplete="email">
        </div>
        <p class="auth-error hidden" id="forgotError"></p>
        <p class="auth-success hidden" id="forgotSuccess"></p>
        <button type="submit" class="btn btn-primary auth-submit">재설정 링크 받기</button>
        <p class="auth-link-row">
          <a href="#" id="backToLoginLink">로그인으로 돌아가기</a>
        </p>
      </form>

      <!-- 회원가입 폼 -->
      <form id="signupForm" class="auth-form hidden">
        <div class="form-field">
          <label>이름</label>
          <input type="text" name="display_name" required>
        </div>
        <div class="form-field">
          <label>이메일</label>
          <input type="email" name="email" required autocomplete="email">
        </div>
        <div class="form-field">
          <label>비밀번호 (8자 이상)</label>
          <input type="password" name="password" required minlength="8" autocomplete="new-password">
        </div>

        <div class="terms-box">
          <label class="terms-row terms-row-all">
            <input type="checkbox" id="agreeAllCheckbox">
            <span>필수 약관에 모두 동의</span>
          </label>
          <div class="terms-divider"></div>
          <label class="terms-row">
            <input type="checkbox" class="terms-required" id="agreeTermsCheckbox">
            <span>[필수] <a href="legal/terms.html" target="_blank">이용약관</a> 동의</span>
          </label>
          <label class="terms-row">
            <input type="checkbox" class="terms-required" id="agreePrivacyCheckbox">
            <span>[필수] <a href="legal/privacy.html" target="_blank">개인정보 수집·이용</a> 동의</span>
          </label>
        </div>

        <p class="auth-error hidden" id="signupError"></p>
        <button type="submit" class="btn btn-primary auth-submit" id="signupSubmitBtn" disabled>회원가입</button>
      </form>

      <p class="auth-hint">데모 계정: demo@example.com / demo1234</p>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/pwa.js"></script>
</body>
</html>
