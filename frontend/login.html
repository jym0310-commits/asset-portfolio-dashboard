<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로그인 - 포트폴리오노트</title>
  <link rel="icon" type="image/svg+xml" href="assets/logo.svg" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="auth-body">
  <div class="auth-page">
    <div class="auth-card">
      <div class="brand-row brand-row-center">
        <img src="assets/logo.svg" alt="포트폴리오노트 로고" class="brand-logo" />
        <h1 class="auth-title">포트폴리오노트</h1>
      </div>

      <div class="auth-tabs">
        <button class="auth-tab active" id="loginTabBtn">로그인</button>
        <button class="auth-tab" id="signupTabBtn">회원가입</button>
      </div>

      <form id="loginForm" class="auth-form">
        <div class="form-field">
          <label>이메일</label>
          <input type="email" name="email" required autocomplete="email">
        </div>
        <div class="form-field">
          <label>비밀번호</label>
          <input type="password" name="password" required autocomplete="current-password">
        </div>
        <p class="auth-error hidden" id="loginError"></p>
        <button type="submit" class="btn btn-primary auth-submit">로그인</button>
      </form>

      <form id="signupForm" class="auth-form hidden">
        <div class="form-field">
          <label>이름</label>
          <input type="text" name="display_name" required>
        </div>
        <div class="form-field">
          <label>이메일</label>
          <input type="email" name="email" required autocomplete="email">
        </div>
        <div class="form-field">
          <label>비밀번호 (4자 이상)</label>
          <input type="password" name="password" required minlength="4" autocomplete="new-password">
        </div>
        <p class="auth-error hidden" id="signupError"></p>
        <button type="submit" class="btn btn-primary auth-submit">회원가입</button>
      </form>

      <p class="auth-hint">데모 계정: demo@example.com / demo1234</p>
    </div>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
